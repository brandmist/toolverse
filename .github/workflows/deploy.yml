name: Production Deployment Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Build & Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Compilation Check
        run: npx tsc --noEmit

      - name: Run Production Build
        run: npm run build
        
      # (Optional) We would add testing here if unit tests were implemented
      # - name: Run Tests
      #   run: npm run test

      - name: Validate Build Output
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: Output directory 'dist' was not created."
            exit 1
          fi
          echo "Build validation successful. Project is ready for Cloudflare Pages."
